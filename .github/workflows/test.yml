name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - run: npm run lint
  # The `node:test` based suite needs Node.js 18+. The library itself still
  # supports Node.js >= 10.13, so legacy versions run the same test files
  # under jest, which the test runner shim (`test/_runner.js`) bridges to
  # transparently. jest, memfs and the runtime deps are installed ad-hoc so
  # the modern dev toolchain (eslint, typescript, prettier) is never required
  # by the legacy matrix.
  legacy-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [10.x, 12.x, 14.x, 16.x]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install jest (Node 10)
        if: matrix.node-version == '10.x'
        shell: bash
        run: |
          rm -f package-lock.json
          npm config set progress false
          yarn add -D jest@^27 memfs@^3 --ignore-scripts --ignore-engines

      - name: Install jest (Node 12-16)
        if: matrix.node-version != '10.x'
        shell: bash
        run: |
          rm -f package-lock.json
          npm config set progress false
          npm install -g npm@7
          npm install -D jest@^27 memfs@^3 --ignore-scripts --no-audit --prefer-offline --no-save --no-package-lock

      - name: Run jest
        run: npx jest --ci
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18.x, 20.x, 22.x, 24.x, 25.x]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The built-in coverage lcov reporter and `--test-coverage-include` are
      # only available on Node.js 22+, so older versions run the suite without
      # collecting coverage.
      - name: Run tests
        if: matrix.node-version == '18.x' || matrix.node-version == '20.x'
        run: npm run test:only

      - name: Run tests with coverage
        if: matrix.node-version != '18.x' && matrix.node-version != '20.x'
        run: npm run test:coverage

      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        if: matrix.node-version != '18.x' && matrix.node-version != '20.x'
        with:
          files: ./coverage/lcov.info
          flags: integration
          token: ${{ secrets.CODECOV_TOKEN }}
